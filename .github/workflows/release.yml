name: Release

# CLAUDE.md: vX.Y.Z 태그 push → .dmg 빌드 후 GitHub Release 업로드.
# 서명·공증은 하지 않는다 (PRD 비기능: 공증은 유료라 선택 — 무서명 배포).
# workflow_dispatch: 태그 push가 불가능한 환경(원격 세션은 브랜치 외 ref push가
# 정책 차단)에서 수동 실행용. tag 입력으로 draft 릴리즈를 만들고, draft를
# publish하는 시점에 GitHub이 해당 태그를 생성한다.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "릴리즈 태그 (예: v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 빌드 + GitHub Release 초안 생성
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "LocalBrush ${{ inputs.tag || github.ref_name }}"
          releaseBody: |
            무서명 배포입니다 — 설치 방법은 README의 "설치" 절을 참고하세요.
            macOS 경고가 뜨면: "확인되지 않은 개발자"는 우클릭 → 열기로 해결되지만,
            "손상되었기 때문에 열 수 없습니다"(Apple Silicon에서 흔함)는 터미널에서
            `xattr -cr /Applications/LocalBrush.app` 실행 후 다시 열어야 합니다.
          releaseDraft: true
          prerelease: false
